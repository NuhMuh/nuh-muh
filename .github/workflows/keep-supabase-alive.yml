name: Keep Supabase Alive

on:
  schedule:
    # 매주 월요일, 목요일 03:00 UTC (주 2회 — 7일 정지 방지)
    - cron: '0 3 * * 1,4'
  workflow_dispatch:  # 수동 실행 버튼도 추가

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/members?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"
